services:
  calculatrice:
    build: .
    ports:
      - "3002:3000"
    environment:
      DB_HOST: db
      DB_NAME: calculatrice
      DB_USER: calc
      DB_PASSWORD: calc
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calculatrice
      POSTGRES_USER: calc
      POSTGRES_PASSWORD: calc
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calc -d calculatrice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
